<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Old Works Unit 7 floor plan</title>
  <desc id="desc">Illustrative floor plan showing workshop layout, switchboard location, rear service route, storage areas and operational QR points.</desc>

  <rect width="1000" height="620" fill="#edf1ee"></rect>

  <rect x="70" y="60" width="860" height="500" rx="20" fill="#f8faf8" stroke="#bcc6bf" stroke-width="4"></rect>

  <text x="95" y="42" font-family="Georgia, serif" font-size="28" fill="#31433b">
    Old Works Unit 7 — Operational Floor Plan
  </text>

  <!-- workshop area -->
  <rect x="120" y="130" width="340" height="220" rx="14" fill="#d9e5de" stroke="#a6b8ad"></rect>

  <text x="220" y="245" font-family="Arial" font-size="24" fill="#31433b">
    Workshop Area
  </text>

  <!-- storage -->
  <rect x="520" y="130" width="180" height="150" rx="14" fill="#e7e0d3" stroke="#c0b295"></rect>

  <text x="565" y="215" font-family="Arial" font-size="22" fill="#544a3b">
    Storage
  </text>

  <!-- service corridor -->
  <rect x="740" y="120" width="110" height="320" rx="10" fill="#dde6ea" stroke="#aab8c0"></rect>

  <text x="760" y="290" transform="rotate(90 760 290)" font-family="Arial" font-size="18" fill="#44545d">
    Rear Service Route
  </text>

  <!-- switchboard -->
  <rect x="120" y="410" width="160" height="80" rx="10" fill="#efe8dc" stroke="#c3b398"></rect>

  <text x="145" y="458" font-family="Arial" font-size="18" fill="#5b4b38">
    Switchboard
  </text>

  <!-- old partition -->
  <line x1="470" y1="120" x2="470" y2="500" stroke="#8d8d8d" stroke-dasharray="10 10" stroke-width="4"></line>

  <text x="430" y="530" font-family="Arial" font-size="16" fill="#666">
    Historic partition line
  </text>

  <!-- overhead service -->
  <line x1="520" y1="330" x2="690" y2="330" stroke="#b07b4d" stroke-width="8" stroke-linecap="round"></line>

  <text x="530" y="360" font-family="Arial" font-size="16" fill="#7a5330">
    Overhead service run
  </text>

  <!-- QR points -->

  <!-- QR1 -->
  <circle cx="250" cy="390" r="16" fill="#6e6650"></circle>
  <text x="278" y="396" font-family="Arial" font-size="15" fill="#31433b">
    QR1 — Electrical
  </text>

  <!-- QR2 -->
  <circle cx="800" cy="450" r="16" fill="#6c7f89"></circle>
  <text x="828" y="456" font-family="Arial" font-size="15" fill="#31433b">
    QR2 — Rear Route
  </text>

  <!-- QR3 -->
  <circle cx="500" cy="510" r="16" fill="#8f7554"></circle>
  <text x="528" y="516" font-family="Arial" font-size="15" fill="#31433b">
    QR3 — Alterations
  </text>

  <!-- QR4 -->
  <circle cx="650" cy="300" r="16" fill="#8d5f56"></circle>
  <text x="678" y="306" font-family="Arial" font-size="15" fill="#31433b">
    QR4 — Contractor Works
  </text>

  <!-- door -->
  <rect x="850" y="250" width="16" height="60" fill="#8f8f8f"></rect>

  <text x="835" y="340" font-family="Arial" font-size="15" fill="#666">
    Rear Service Door
  </text>

</svg>
